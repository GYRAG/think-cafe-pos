<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ფიქრის კუთხე - შესვლა</title>
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- App Styling -->
    <link rel="stylesheet" href="css/app.css" />
    
    <!-- Custom styling just for login -->
    <style>
      .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .login-card {
        background-color: var(--color-white);
        padding: 2rem;
        border-radius: 1.5rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        width: 100%;
        max-width: 28rem;
      }
      .login-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2rem;
      }
      .login-header img {
        width: 5rem;
        height: 5rem;
        border-radius: 1rem;
        object-fit: cover;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        margin-bottom: 1rem;
      }
      .login-title {
        font-size: 1.875rem;
        font-weight: 700;
        color: var(--color-stone-800);
        letter-spacing: -0.025em;
      }
      .login-subtitle {
        color: var(--color-stone-500);
        margin-top: 0.5rem;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--color-stone-700);
        margin-bottom: 0.5rem;
      }
      .form-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid var(--color-stone-200);
        font-family: inherit;
        font-size: 1rem;
        color: var(--color-stone-900);
        background-color: var(--color-white);
      }
      .form-input:focus {
        outline: none;
        border-color: var(--color-green-500);
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
      }
      .error-box {
        padding: 1rem;
        background-color: var(--color-red-50);
        color: var(--color-red-600);
        border-radius: 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 1.5rem;
      }
      .btn-login {
        width: 100%;
        padding: 1rem;
        background-color: var(--color-green-600);
        color: var(--color-white);
        border: none;
        border-radius: 0.75rem;
        font-weight: 700;
        font-size: 1.125rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.2);
      }
      .btn-login:disabled {
        background-color: var(--color-stone-300);
        cursor: not-allowed;
        box-shadow: none;
      }
    </style>
  </head>
  
  <body x-data="loginForm()" x-init="init()">
    <!-- Global loader while checking session -->
    <div x-show="authLoading" class="loader-container">
      <div class="spinner"></div>
    </div>

    <div x-show="!authLoading" class="login-container" x-cloak>
      <div class="login-card">
        <div class="login-header">
          <!-- Fallback image source if assets not copied over yet -->
          <img src="logo-think-corner.jpg" alt="ფიქრის კუთხე" onerror="this.src='https://placehold.co/80x80/1c1917/ffffff?text=TK'" />
          <h1 class="login-title">ფიქრის კუთხე</h1>
          <p class="login-subtitle">სისტემაში შესვლა</p>
        </div>

        <form @submit.prevent="handleLogin()">
          <div x-show="error" x-text="error" class="error-box" x-cloak></div>

          <div class="form-group">
            <label class="form-label">იმეილი</label>
            <input
              type="email"
              x-model="email"
              class="form-input"
              placeholder="example@cafe.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label">პაროლი</label>
            <input
              type="password"
              x-model="password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>

          <button
            type="submit"
            :disabled="loading"
            class="btn-login"
          >
            <template x-if="loading">
              <div class="spinner-sm"></div>
            </template>
            <span x-text="loading ? 'შესვლა...' : 'შესვლა'"></span>
          </button>
        </form>
      </div>
    </div>

    <!-- Application Script -->
    <script type="module">
      import { initAuth } from './js/auth.js';
      import { supabase } from './js/supabase-client.js';

      window.loginForm = () => ({
        authManager: null,
        authLoading: true,
        email: '',
        password: '',
        error: '',
        loading: false,

        async init() {
          this.authManager = initAuth();
          
          // Wait for session check to complete before showing login page to prevent flicker
          // initAuth handles the redirection if a user is already logged in
          const { data } = await supabase.auth.getSession();
          await this.authManager.handleSession(data.session);
          
          // If we are still on this page and handleSession finished, fade in form
          this.authLoading = false;
        },

        async handleLogin() {
          this.error = '';
          this.loading = true;

          const { error: authError } = await supabase.auth.signInWithPassword({
            email: this.email,
            password: this.password,
          });

          this.loading = false;

          if (authError) {
            this.error = 'არასწორი მომხმარებელი ან პაროლი';
          } else {
            // Successfully logged in; reload to trigger auth flow / redirect from init
            window.location.href = 'index.html';
          }
        }
      });
      
      // Load Alpine dynamically after our logic is ready to avoid ReferenceErrors
      import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/module.esm.js';
      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </body>
</html>
