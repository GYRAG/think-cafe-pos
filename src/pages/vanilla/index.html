<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ფიქრის კუთხე - სალარო</title>
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- App Styling -->
    <link rel="stylesheet" href="css/app.css" />
  </head>
  
  <body x-data="posApp()" x-init="init()" class="hide-scrollbar">
    
    <!-- Global Loader -->
    <div x-show="loading" class="loader-container">
      <div class="spinner"></div>
    </div>

    <!-- Error State -->
    <div x-show="!loading && error" class="loader-container flex-col gap-4 text-stone-500" x-cloak>
      <p x-text="error"></p>
      <button @click="fetchProducts()" class="p-4 bg-stone-200 rounded-xl font-bold">თავიდან ცდა</button>
    </div>

    <!-- POS App Container -->
    <div x-show="!loading && !error" class="pos-container flex-col" style="flex-direction: column;" x-cloak>
      
      <!-- Top Bar -->
      <header style="height: 4rem; background: var(--color-white); border-bottom: 1px solid var(--color-stone-200); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; flex-shrink: 0;">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <img src="logo-think-corner.jpg" alt="ფიქრის კუთხე" style="width: 2rem; height: 2rem; border-radius: 0.5rem; object-fit: cover; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);" onerror="this.src='https://placehold.co/32x32/1c1917/ffffff?text=TK'" />
            <h1 style="font-size: 1.25rem; font-weight: 900; color: var(--color-stone-800); letter-spacing: -0.025em;">ფიქრის კუთხე</h1>
          </div>
          <span style="padding: 0.25rem 0.75rem; background: var(--color-stone-100); border-radius: 9999px; font-size: 0.875rem; font-weight: 500; color: var(--color-stone-600);" x-text="authManager?.user?.username + ' (' + (authManager?.user?.role === 'admin' ? 'ადმინი' : 'მოლარე') + ')'"></span>
        </div>

        <div style="display: flex; align-items: center; gap: 1rem;">
          <template x-if="authManager?.user?.role === 'admin'">
            <a href="admin.html" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--color-stone-100); color: var(--color-stone-700); border-radius: 0.75rem; font-weight: 500; text-decoration: none;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
              ადმინ პანელი
            </a>
          </template>
          <button @click="authManager.logout()" style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; color: var(--color-red-600); background: transparent; border: none; font-weight: 500; cursor: pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            გასვლა
          </button>
        </div>
      </header>

      <!-- Main Layout Body -->
      <div style="display: flex; flex: 1; overflow: hidden;">
        <!-- Left Side (70%): Product Grid -->
      <div class="pos-left">
        <!-- Categories -->
        <div class="categories-bar hide-scrollbar">
          <button 
            @click="selectedCategory = null" 
            :class="!selectedCategory ? 'btn-category active' : 'btn-category'"
          >ყველა</button>
          
          <template x-for="category in categories" :key="category">
            <button 
              @click="selectedCategory = category" 
              :class="selectedCategory === category ? 'btn-category active' : 'btn-category'"
              x-text="category"
            ></button>
          </template>
        </div>

        <!-- Products Scroll Area -->
        <div class="pos-scroll">
          <div class="product-grid">
            
            <template x-for="product in filteredProducts()" :key="product.id">
              <button @click="$store.pos.addToCart(product)" class="pos-card">
                <div class="product-image-container">
                  <template x-if="product.image_url">
                    <img :src="product.image_url" :alt="product.name" loading="lazy" decoding="async">
                  </template>
                  <template x-if="!product.image_url">
                    <span style="font-size:3rem; color:var(--color-stone-300)">🛍️</span>
                  </template>
                  <div class="product-price-badge" x-text="product.price + '₾'"></div>
                </div>
                <div class="product-info">
                  <h3 class="product-title" x-text="product.name"></h3>
                  <p class="product-category" x-text="product.category"></p>
                </div>
              </button>
            </template>
            
            <div x-show="filteredProducts().length === 0" style="grid-column: 1 / -1; text-align: center; color: var(--color-stone-400); padding: 3rem;">
              პროდუქტები არ მოიძებნა
            </div>

          </div>
        </div>
      </div>

      <!-- Right Side (30%): Cart -->
      <div class="pos-right">
        <!-- Cart Header -->
        <div class="cart-header">
          <h2>მიმდინარე შეკვეთა</h2>
          <button x-show="$store.pos.cart.length > 0" @click="$store.pos.clearCart()" class="btn-icon" title="გასუფთავება">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>

        <!-- Cart Items -->
        <div class="cart-items hide-scrollbar">
          
          <div x-show="$store.pos.cart.length === 0" class="empty-cart">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <p>შეკვეთა ცარიელია</p>
          </div>

          <template x-for="item in $store.pos.cart" :key="item.product.id">
            <div class="cart-item">
              <div class="cart-item-top">
                <span class="cart-item-title" x-text="item.product.name"></span>
                <span class="cart-item-total" x-text="(item.product.price * item.quantity).toFixed(2) + '₾'"></span>
              </div>
              <div class="cart-item-bottom">
                <span class="cart-item-price" x-text="item.product.price + '₾ / ცალი'"></span>
                <div class="qty-controls">
                  <button @click="$store.pos.updateCartQuantity(item.product.id, -1)" class="btn-qty">
                    <!-- Minus Icon -->
                    <svg x-show="item.quantity > 1" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" x2="19" y1="12" y2="12"/></svg>
                    <!-- Trash Icon for quantity 1 -->
                    <svg x-show="item.quantity === 1" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--color-red-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                  </button>
                  <span class="qty-display" x-text="item.quantity"></span>
                  <button @click="$store.pos.updateCartQuantity(item.product.id, 1)" class="btn-qty">
                    <!-- Plus Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Checkout Section -->
        <div class="checkout-section">
          <div class="total-row">
            <span class="total-label">სულ გადასახდელი:</span>
            <span class="total-amount" x-text="$store.pos.totalAmount.toFixed(2) + '₾'"></span>
          </div>

          <button 
            @click="handleCheckout()"
            :disabled="$store.pos.cart.length === 0 || checkingOut"
            :class="confirming ? 'btn-checkout confirm' : 'btn-checkout primary'"
          >
            <template x-if="checkingOut">
              <div class="spinner-sm"></div>
            </template>
            <template x-if="checkingOut">
              <span>სრულდება...</span>
            </template>
            
            <template x-if="!checkingOut && confirming">
              <div style="display:flex; align-items:center; gap:0.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <span>დაადასტურეთ შეკვეთა</span>
              </div>
            </template>
            
            <template x-if="!checkingOut && !confirming">
              <span>შეკვეთის დასრულება</span>
            </template>
          </button>
          
          <button 
            x-show="confirming && !checkingOut" 
            @click="confirming = false" 
            class="btn-cancel"
          >
            გაუქმება
          </button>
        </div>
      </div>
     </div> <!-- End Main Body -->
    </div> <!-- End POS Container -->

    <!-- Application Script -->
    <script type="module">
      import { initAuth } from './js/auth.js';
      import { getProducts, completeOrder } from './js/db.js';
      import './js/store.js';

      // 1. Assign component to window so Alpine can find it
      window.posApp = () => ({
        authManager: null,
        products: [],
        categories: [],
        selectedCategory: null,
        loading: true,
        error: null,
        confirming: false,
        checkingOut: false,

        async init() {
          this.authManager = initAuth();
          await this.authManager.init();

          // If auth flow hasn't redirected them, fetch products
          if (this.authManager.user) {
            await this.fetchProducts();
          }
        },

        async fetchProducts() {
          this.loading = true;
          this.error = null;
          try {
            const data = await getProducts();
            this.products = data.filter(p => p.is_active);
            this.categories = [...new Set(this.products.map(p => p.category))];
          } catch (err) {
            this.error = err.message || 'ვერ მოხერხდა პროდუქტების ჩატვირთვა';
          } finally {
            this.loading = false;
          }
        },

        filteredProducts() {
          if (!this.selectedCategory) return this.products;
          return this.products.filter(p => p.category === this.selectedCategory);
        },

        async handleCheckout() {
            // Access the global store cart
          const cartItems = this.$store.pos.cart;
          
          if (cartItems.length === 0 || this.checkingOut) return;
          
          if (!this.confirming) {
            this.confirming = true;
          } else {
            this.checkingOut = true;
            try {
              // Must clone cart items since db.js completeOrder expects them
              await completeOrder(JSON.parse(JSON.stringify(cartItems)));
              this.$store.pos.clearCart();
              this.confirming = false;
            } catch (err) {
              console.error('[completeOrder] Failed:', err);
              alert(`შეკვეთის დასრულება ვერ მოხერხდა:\n${err.message || JSON.stringify(err)}`);
            } finally {
              this.checkingOut = false;
            }
          }
        }
      });

      // 2. Load Alpine dynamically after our logic is ready to avoid ReferenceErrors
      import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/module.esm.js';
      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </body>
</html>
